<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeri Slider Gambar</title>
    <!-- Menggunakan Tailwind CSS untuk styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Mencegah gambar terseret saat digeser (untuk mouse) */
        .slide-img {
            user-drag: none;
            -webkit-user-drag: none;
            user-select: none;
            -moz-user-select: none;
            -webkit-user-select: none;
            -ms-user-select: none;
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex flex-col items-center justify-center p-4">

    <div class="max-w-4xl w-full bg-white rounded-2xl shadow-xl overflow-hidden p-6">
        <h1 class="text-2xl font-bold text-gray-800 mb-6 text-center"></h1>

        <!-- Wadah Utama Slider -->
        <div class="relative w-full aspect-video rounded-xl overflow-hidden bg-gray-200 group">
            
            <!-- Track Slider (Tempat gambar-gambar dijajarkan) -->
            <div id="sliderTrack" class="slider-track flex w-full h-full">
                <!-- Slide 1 -->
                <div class="min-w-full h-full flex-shrink-0">
                    <img src="https://raw.githubusercontent.com/wanrifalgg/malau/blob/main/dance-cat-gif-find-share-on-giphy.gif" 
                         alt="Gambar 1" 
                         class="slide-img w-full h-full object-contain bg-gray-900"
                         onerror="this.onerror=null; this.src='https://via.placeholder.com/800x450?text=Gambar+Tidak+Ditemukan';">
                </div>
                
                <!-- Slide 2 -->
                <div class="min-w-full h-full flex-shrink-0">
                    <img src="https://raw.githubusercontent.com/wanrifalgg/malau/main/Untitled%20Project.jpg" 
                         alt="Gambar 2" 
                         class="slide-img w-full h-full object-contain bg-gray-900"
                         onerror="this.onerror=null; this.src='https://via.placeholder.com/800x450?text=Gambar+Tidak+Ditemukan';">
                </div>
                
                <!-- Slide 3 -->
                <div class="min-w-full h-full flex-shrink-0">
                    <img src="https://raw.githubusercontent.com/wanrifalgg/malau/main/icon.png" 
                         alt="Gambar 3" 
                         class="slide-img w-full h-full object-contain bg-gray-900"
                         onerror="this.onerror=null; this.src='https://via.placeholder.com/800x450?text=Gambar+Tidak+Ditemukan';">
                </div>
            </div>

            <!-- Tombol Navigasi Sebelumnya -->
            <button id="prevBtn" class="absolute left-4 top-1/2 transform -translate-y-1/2 bg-black/40 hover:bg-black/70 text-white w-10 h-10 rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity duration-300 focus:outline-none focus:ring-2 focus:ring-white">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
                </svg>
            </button>

            <!-- Tombol Navigasi Selanjutnya -->
            <button id="nextBtn" class="absolute right-4 top-1/2 transform -translate-y-1/2 bg-black/40 hover:bg-black/70 text-white w-10 h-10 rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-opacity duration-300 focus:outline-none focus:ring-2 focus:ring-white">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" />
                </svg>
            </button>

            <!-- Indikator Titik (Dots) di bawah gambar -->
            <div id="dotsContainer" class="absolute bottom-4 left-0 right-0 flex justify-center space-x-2">
                <!-- Titik-titik akan dibuat secara dinamis menggunakan JavaScript -->
            </div>
        </div>
        
        <p class="text-sm text-gray-500 text-center mt-4">
        </p>
    </div>

    <!-- Script Logika Slider -->
    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const track = document.getElementById('sliderTrack');
            const prevBtn = document.getElementById('prevBtn');
            const nextBtn = document.getElementById('nextBtn');
            const dotsContainer = document.getElementById('dotsContainer');
            
            let originalSlides = Array.from(track.children);
            const originalLength = originalSlides.length;
            
            // Buat clone untuk slide pertama dan terakhir untuk efek infinity
            const firstClone = originalSlides[0].cloneNode(true);
            const lastClone = originalSlides[originalLength - 1].cloneNode(true);
            
            firstClone.id = 'first-clone';
            lastClone.id = 'last-clone';
            
            // Tambahkan clone ke DOM
            track.appendChild(firstClone);
            track.insertBefore(lastClone, originalSlides[0]);
            
            const slides = Array.from(track.children);
            const totalSlides = slides.length;
            
            let currentIndex = 1; // Mulai dari slide asli pertama (indeks 1 karena ada clone di 0)
            let autoSlideInterval;
            let isTransitioning = false; // Mencegah klik ganda saat animasi berjalan

            // Set posisi awal (tanpa animasi)
            track.style.transform = `translateX(-${currentIndex * 100}%)`;

            // Membuat titik indikator sesuai jumlah slide asli
            for (let i = 0; i < originalLength; i++) {
                const dot = document.createElement('button');
                dot.classList.add('w-3', 'h-3', 'rounded-full', 'transition-all', 'duration-300', 'focus:outline-none');
                
                if (i === 0) {
                    dot.classList.add('bg-white', 'w-6');
                } else {
                    dot.classList.add('bg-white/50', 'hover:bg-white/80');
                }
                
                dot.addEventListener('click', () => {
                    if (isTransitioning) return;
                    goToSlide(i + 1); // Indeks asli ditambah 1 karena ada clone di awal
                    resetAutoSlide();
                });
                
                dotsContainer.appendChild(dot);
            }

            const dots = dotsContainer.children;

            function updateDots() {
                // Hitung indeks dot aktif yang sebenarnya
                let activeDotIndex = currentIndex - 1;
                if (currentIndex === 0) {
                    activeDotIndex = originalLength - 1;
                } else if (currentIndex === totalSlides - 1) {
                    activeDotIndex = 0;
                }

                for (let i = 0; i < originalLength; i++) {
                    if (i === activeDotIndex) {
                        dots[i].classList.remove('bg-white/50', 'hover:bg-white/80');
                        dots[i].classList.add('bg-white', 'w-6');
                    } else {
                        dots[i].classList.remove('bg-white', 'w-6');
                        dots[i].classList.add('bg-white/50', 'hover:bg-white/80');
                    }
                }
            }

            function goToSlide(index) {
                if (isTransitioning) return;
                isTransitioning = true;
                currentIndex = index;
                // Nyalakan kembali transisi animasi setiap berpindah
                track.style.transition = 'transform 0.5s ease-in-out';
                track.style.transform = `translateX(-${currentIndex * 100}%)`;
                updateDots();
            }

            // Event listener kunci untuk membuat efek infinity mulus
            track.addEventListener('transitionend', () => {
                isTransitioning = false;
                
                // Jika sedang berada di slide clone pertama, lompat ke slide asli pertama diam-diam
                if (slides[currentIndex].id === 'first-clone') {
                    track.style.transition = 'none'; 
                    currentIndex = 1; 
                    track.style.transform = `translateX(-${currentIndex * 100}%)`;
                }
                // Jika sedang berada di slide clone terakhir, lompat ke slide asli terakhir diam-diam
                if (slides[currentIndex].id === 'last-clone') {
                    track.style.transition = 'none'; 
                    currentIndex = originalLength; 
                    track.style.transform = `translateX(-${currentIndex * 100}%)`;
                }
            });

            nextBtn.addEventListener('click', () => {
                if (isTransitioning) return;
                goToSlide(currentIndex + 1);
                resetAutoSlide();
            });

            prevBtn.addEventListener('click', () => {
                if (isTransitioning) return;
                goToSlide(currentIndex - 1);
                resetAutoSlide();
            });

            function startAutoSlide() {
                autoSlideInterval = setInterval(() => {
                    if (!isTransitioning) {
                        goToSlide(currentIndex + 1);
                    }
                }, 5000);
            }

            function resetAutoSlide() {
                clearInterval(autoSlideInterval);
                startAutoSlide();
            }

            startAutoSlide();

            const sliderContainer = track.parentElement;
            sliderContainer.addEventListener('mouseenter', () => clearInterval(autoSlideInterval));
            sliderContainer.addEventListener('mouseleave', startAutoSlide);
        });
    </script>
</body>
</html>
